name: elinacura_mobile
description: ElinaCura — AI-assisted personal health companion (iOS & Android).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  intl: ^0.20.2

  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5
  firebase_app_check: ^0.3.2+5
  firebase_crashlytics: ^4.3.5

  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  camera: ^0.11.1
  image_picker: ^1.1.2
  mobile_scanner: ^7.0.0
  flutter_local_notifications: ^18.0.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.4
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.3
  equatable: ^2.0.7
  collection: ^1.19.1
  speech_to_text: ^7.0.0
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  pdf: ^3.12.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: '#F5F1EA'
  adaptive_icon_foreground: assets/images/logo.png
  remove_alpha_ios: true

flutter_native_splash:
  color: '#F5F1EA'
  image: assets/images/logo.png
  color_dark: '#06090E'
  image_dark: assets/images/logo.png
  android_12:
    color: '#F5F1EA'
    image: assets/images/logo.png
    color_dark: '#06090E'
    image_dark: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/design/
    - assets/i18n/
    - assets/images/
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
    - family: Bricolage Grotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque-Regular.ttf
          weight: 400
        - asset: assets/fonts/BricolageGrotesque-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BricolageGrotesque-Bold.ttf
          weight: 700
        - asset: assets/fonts/BricolageGrotesque-ExtraBold.ttf
          weight: 800
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700

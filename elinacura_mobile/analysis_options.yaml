# Static analysis configuration for ElinaCura.
# Builds on the recommended Flutter lints with a few high-signal additions.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat accidental prints and forgotten awaits as warnings, not silent info.
    avoid_print: warning
    unawaited_futures: warning

linter:
  rules:
    - prefer_single_quotes
    - use_super_parameters
    - unawaited_futures
    - avoid_print
    - sized_box_for_whitespace
    - prefer_final_locals
